{% extends "layout.html" %}

{% block title %}Login | Smart Study Assistant{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Access your study guides</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group" style="position: relative;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 1rem; top: 2.2rem; cursor: pointer; color: var(--text-muted);"></i>
            </div>

            <div style="text-align: right; margin-bottom: 2rem;">
                <a href="{{ url_for('forgot_password') }}" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary" style="margin: 0; width: 100%;">
                Log In
            </button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
