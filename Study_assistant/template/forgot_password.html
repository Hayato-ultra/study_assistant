{% extends "layout.html" %}

{% block title %}Reset Password | Smart Study Assistant{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass">
        <div class="auth-header">
            <h2>Forgotten?</h2>
            <p>Enter your email to receive recovery link</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">
                Send Reset Link
            </button>
        </form>

        <div class="auth-links">
            Remembered? <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
